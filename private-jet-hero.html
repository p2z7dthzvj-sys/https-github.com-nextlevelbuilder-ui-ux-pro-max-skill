<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyElite — Premium Private Jets</title>

  <!-- Inter Font (400, 500, 600, 700) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS (Play CDN — JIT, supports arbitrary values) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React 18 -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Babel (JSX transform) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    /* Apply Inter to entire body */
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    /* ── Constants ───────────────────────────── */
    const VIDEO_URL =
      'https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260328_091828_e240eb17-6edc-4129-ad9d-98678e3fd238.mp4';

    const NAV_ITEMS = ['Start', 'Story', 'Rates', 'Benefits', 'FAQ'];

    /* ── Lucide-style inline SVG icons ───────── */
    const MenuIcon = () => (
      <svg
        width="22" height="22"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        strokeWidth="2"
        strokeLinecap="round"
        strokeLinejoin="round"
        aria-hidden="true"
      >
        <line x1="3"  y1="6"  x2="21" y2="6"  />
        <line x1="3"  y1="12" x2="21" y2="12" />
        <line x1="3"  y1="18" x2="21" y2="18" />
      </svg>
    );

    const XIcon = () => (
      <svg
        width="22" height="22"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        strokeWidth="2"
        strokeLinecap="round"
        strokeLinejoin="round"
        aria-hidden="true"
      >
        <line x1="18" y1="6"  x2="6"  y2="18" />
        <line x1="6"  y1="6"  x2="18" y2="18" />
      </svg>
    );

    /* ── Component ───────────────────────────── */
    function SkyEliteHero() {
      const [menuOpen, setMenuOpen] = useState(false);

      return (
        <div className="min-h-screen bg-gray-50">
          <section className="relative h-screen overflow-hidden">

            {/* ── Video Background ──────────────── */}
            <video
              autoPlay
              muted
              loop
              playsInline
              className="absolute inset-0 w-full h-full object-cover"
            >
              <source src={VIDEO_URL} type="video/mp4" />
            </video>

            {/* ── Content Wrapper ───────────────── */}
            <div className="relative h-full flex flex-col">

              {/* Navigation */}
              <nav className="w-full">
                <div className="max-w-7xl mx-auto px-8 py-6 flex items-center justify-between">

                  {/* Brand */}
                  <a href="#" className="text-2xl font-semibold text-gray-900">
                    SkyElite
                  </a>

                  {/* Desktop nav links — hidden on mobile */}
                  <div className="hidden md:flex items-center gap-8">
                    {NAV_ITEMS.map(item => (
                      <a
                        key={item}
                        href="#"
                        className="text-sm font-medium text-gray-900 hover:text-gray-700 transition-colors"
                      >
                        {item}
                      </a>
                    ))}
                  </div>

                  {/* Mobile hamburger / close toggle */}
                  <button
                    onClick={() => setMenuOpen(prev => !prev)}
                    className="md:hidden text-gray-900 p-1 -mr-1"
                    aria-label={menuOpen ? 'Close menu' : 'Open menu'}
                    aria-expanded={menuOpen}
                  >
                    {menuOpen ? <XIcon /> : <MenuIcon />}
                  </button>
                </div>

                {/* Mobile dropdown */}
                {menuOpen && (
                  <div className="md:hidden mx-4 mb-3 bg-white/95 backdrop-blur-sm rounded-2xl shadow-lg overflow-hidden border border-gray-100/60">
                    <div className="flex flex-col">
                      {NAV_ITEMS.map(item => (
                        <a
                          key={item}
                          href="#"
                          className="px-6 py-3 text-sm font-medium text-gray-900 hover:text-gray-700 hover:bg-gray-50 transition-colors border-b border-gray-100 last:border-b-0"
                          onClick={() => setMenuOpen(false)}
                        >
                          {item}
                        </a>
                      ))}
                    </div>
                  </div>
                )}
              </nav>

              {/* ── Main Content Area ─────────────── */}
              <main className="flex-1 flex items-center justify-center">
                {/*
                  -mt-80 (−320px) pulls the content block upward so it
                  sits in the upper-centre of the viewport, above the
                  natural vertical midpoint.
                */}
                <div className="-mt-80 text-center px-6">

                  {/* Eyebrow label */}
                  <p className="text-sm font-semibold text-gray-600 tracking-wider uppercase mb-4">
                    PRIVATE JETS
                  </p>

                  {/* Two-line heading with deliberate overlap */}
                  <h1>
                    <span className="block text-6xl md:text-7xl lg:text-8xl font-normal text-gray-500 leading-none tracking-tighter">
                      Premium.
                    </span>
                    <span
                      className="block text-6xl md:text-7xl lg:text-8xl font-normal leading-none tracking-tighter"
                      style={{ color: '#202A36', marginTop: '-12px' }}
                    >
                      Accessible.
                    </span>
                  </h1>

                  {/* Subtitle */}
                  <p className="text-lg md:text-xl text-gray-600 max-w-2xl mx-auto mt-6 mb-6">
                    Your dedication deserves recognition.
                  </p>

                  {/* CTA buttons */}
                  <div className="flex gap-4 justify-center">
                    <button className="px-4 py-2 rounded-full bg-gray-300 text-gray-800 font-medium hover:bg-gray-400 transition-colors cursor-pointer">
                      Discover
                    </button>
                    <button className="px-4 py-2 rounded-full text-white font-medium transition-colors cursor-pointer bg-[#202A36] hover:bg-[#1a2229]">
                      Book Now
                    </button>
                  </div>

                </div>
              </main>

            </div>
          </section>
        </div>
      );
    }

    /* ── Mount ───────────────────────────────── */
    ReactDOM.createRoot(document.getElementById('root')).render(<SkyEliteHero />);
  </script>
</body>
</html>
